<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="605 Chaser">
<title>605 Chaser — Field Scorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --bg2: #161616; --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --text2: #999; --text3: #666;
    --green: #639922; --green-bg: rgba(99,153,34,0.12); --green-text: #8fc93a;
    --amber: #BA7517; --amber-bg: rgba(186,117,23,0.12); --amber-text: #e09a3a;
    --red: #c0392b; --red-bg: rgba(192,57,43,0.12); --red-text: #e05a4a;
    --accent: #e05a1a; --radius: 10px; --radius-lg: 14px;
  }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
  header { padding: 1rem 1rem 0.75rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  header .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  header p { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .main { padding: 1rem; }
  .loc-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .loc-row input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 14px; padding: 0 12px; height: 40px; outline: none; }
  .loc-row input:focus { border-color: var(--accent); }
  .loc-row button { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-family: inherit; font-size: 14px; font-weight: 500; padding: 0 16px; height: 40px; cursor: pointer; white-space: nowrap; }
  .score-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .score-info .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
  .score-info .num { font-size: 36px; font-weight: 600; line-height: 1; margin: 3px 0; color: var(--text); }
  .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 1rem 0 0.5rem; }
  .param-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .param-icon { font-size: 18px; width: 22px; text-align: center; color: var(--text3); flex-shrink: 0; }
  .param-info { flex: 1; min-width: 0; }
  .param-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .param-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .bar { height: 3px; border-radius: 2px; background: var(--border2); overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .param-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; min-width: 56px; }
  .param-val { font-size: 14px; font-weight: 500; color: var(--text); text-align: right; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .badge { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 20px; }
  .badge-live { background: var(--green-bg); color: var(--green-text); }
  .badge-est { background: var(--amber-bg); color: var(--amber-text); }
  .g { background: var(--green); } .a { background: var(--amber); } .r { background: var(--red); }
  .bg-g { background: var(--green); } .bg-a { background: var(--amber); } .bg-r { background: var(--red); }
  .verdict-g { color: var(--green-text); } .verdict-a { color: var(--amber-text); } .verdict-r { color: var(--red-text); }
  .status { text-align: center; padding: 2rem 0; font-size: 14px; color: var(--text2); }
  .status.err { color: var(--red-text); }
  .loc-disp { font-size: 12px; color: var(--text2); margin-bottom: 0.75rem; }
  .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 0.75rem; border-top: 0.5px solid var(--border); }
  .foot span { font-size: 12px; color: var(--text3); }
  .foot button { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text2); font-family: inherit; font-size: 13px; padding: 6px 12px; cursor: pointer; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f5f5f5; --bg2: #ffffff; --bg3: #efefef; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14); --text: #111; --text2: #666; --text3: #999; --green-text: #3B6D11; --amber-text: #854F0B; --red-text: #A32D2D; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">⛈</div>
  <div><h1>605 Chaser</h1><p>SPC field parameter scorer</p></div>
</header>
<div class="main">
  <div class="loc-row" style="margin-top:0.75rem;">
    <input type="text" id="loc-input" placeholder="City, state or lat,lon" value="Sioux Falls, SD" autocomplete="off" />
    <button onclick="fetchData()">Score</button>
  </div>
  <div id="loc-disp" class="loc-disp" style="display:none;"></div>
  <div id="score-wrap" style="display:none;">
    <div class="score-card">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle cx="34" cy="34" r="28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
        <circle cx="34" cy="34" r="28" fill="none" stroke="#639922" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round" transform="rotate(-90 34 34)" id="ring-arc"/>
      </svg>
      <div class="score-info">
        <div class="label">Chase score</div>
        <div class="num" id="score-num">—</div>
        <div class="verdict" id="score-verdict" style="font-size:13px;font-weight:500;">—</div>
      </div>
    </div>
  </div>
  <div id="params-wrap" style="display:none;">
    <div class="section-label">Thermodynamics</div>
    <div id="thermo-grid"></div>
    <div class="section-label">Kinematics</div>
    <div id="kine-grid"></div>
    <div class="section-label">Surface</div>
    <div id="sfc-grid"></div>
  </div>
  <div id="status" class="status"><div class="spinner"></div>Loading…</div>
  <div id="foot" class="foot" style="display:none;">
    <span id="updated"></span>
    <button onclick="fetchData()">↺ Refresh</button>
  </div>
</div>
<script>
// *** REPLACE THIS with your Render backend URL after deploying ***
const API_BASE = 'https://chase-api.onrender.com';

(function(){
  const m={name:'605 Chaser',short_name:'605 Chaser',start_url:'.',display:'standalone',background_color:'#0d0d0d',theme_color:'#0d0d0d',icons:[{src:'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/26c8.png',sizes:'72x72',type:'image/png'}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
})();

async function geocode(loc){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(loc)}&format=json&limit=1`);
  const d=await r.json();
  if(!d.length)throw new Error('Location not found');
  return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),name:d[0].display_name.split(',').slice(0,2).join(',').trim()};
}

const PARAMS=[
  {key:'cape',     icon:'🔥', label:'MLCAPE',           sub:'Need 2500+ J/kg',    thresh:2500, score:v=>v>=2500?1:v>=1000?0.5:0, bar:v=>Math.min(100,v/40),        grp:'thermo'},
  {key:'cin',      icon:'🛡', label:'CIN weakening',    sub:'Need > −50 J/kg',    thresh:-50,  score:v=>v>=-50?1:v>=-100?0.5:0,  bar:v=>Math.min(100,Math.max(0,(v+200)/2)), grp:'thermo'},
  {key:'lcl',      icon:'☁️', label:'LCL height',       sub:'Need under 1200 m',  thresh:1200, score:v=>v<=1200?1:v<=1800?0.5:0, bar:v=>Math.min(100,Math.max(0,(2400-v)/24)), grp:'thermo'},
  {key:'shear_06km',icon:'➡️',label:'0–6 km bulk shear',sub:'Need 40+ kts',       thresh:40,   score:v=>v>=40?1:v>=25?0.5:0,     bar:v=>Math.min(100,v/0.6),       grp:'kine'},
  {key:'srh_01km', icon:'🌀', label:'0–1 km SRH',       sub:'Need 150+ m²/s²',   thresh:150,  score:v=>v>=150?1:v>=75?0.5:0,    bar:v=>Math.min(100,v/3),         grp:'kine'},
  {key:'dewpoint', icon:'💧', label:'Dewpoint',          sub:'Need 65°F+',         thresh:65,   score:v=>v>=65?1:v>=58?0.5:0,     bar:v=>Math.min(100,Math.max(0,(v-40)/0.35)), grp:'sfc'},
  {key:'convergence',icon:'🌊',label:'Surface convergence',sub:'Need 10+',        thresh:10,   score:v=>v>=10?1:v>=5?0.5:0,      bar:v=>Math.min(100,v*5),         grp:'sfc'},
  {key:'boundary', icon:'〰️', label:'Boundary present', sub:'CAPE + CIN proxy',   thresh:null, score:v=>v==='likely'?1:0.5,       bar:v=>v==='likely'?100:50,       grp:'sfc'},
];

function dotCls(s){return s===1?'g':s===0.5?'a':'r';}
function barCls(s){return s===1?'bg-g':s===0.5?'bg-a':'bg-r';}
function ringColor(p){return p>=65?'#639922':p>=40?'#BA7517':'#c0392b';}
function badge(src){return src==='live'||src==='hrrr'||src==='synoptic'?'<span class="badge badge-live">live</span>':'<span class="badge badge-est">est</span>';}

function renderParam(p, val, score, barPct, src, container){
  const row=document.createElement('div');
  row.className='param-row';
  const display = typeof val==='number' ? (Number.isInteger(val)?val.toLocaleString():val.toFixed(1)) : val;
  const unit = PARAMS.find(x=>x.key===p)?.sub.match(/\(([^)]+)\)/)?.[1]||'';
  row.innerHTML=`<span class="param-icon">${PARAMS.find(x=>x.key===p).icon}</span><div class="param-info"><div class="param-name">${PARAMS.find(x=>x.key===p).label} ${badge(src)}</div><div class="param-sub">${PARAMS.find(x=>x.key===p).sub}</div><div class="bar"><div class="bar-fill ${barCls(score)}" style="width:${Math.round(barPct)}%"></div></div></div><div class="param-right"><div class="dot ${dotCls(score)}"></div><div class="param-val">${display}</div></div>`;
  container.appendChild(row);
}

function setStatus(msg,err=false){
  const el=document.getElementById('status');
  el.style.display='block';el.className='status'+(err?' err':'');
  el.innerHTML=err?msg:`<div class="spinner"></div>${msg}`;
}

async function fetchData(){
  const loc=document.getElementById('loc-input').value.trim();
  if(!loc)return;
  setStatus('Locating…');
  ['score-wrap','params-wrap','foot'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('loc-disp').style.display='none';
  try{
    const geo=await geocode(loc);
    setStatus('Fetching HRRR data…');
    const r=await fetch(`${API_BASE}/score?lat=${geo.lat}&lon=${geo.lon}`);
    if(!r.ok){const t=await r.text();throw new Error('API error: '+t.slice(0,120));}
    const data=await r.json();
    const params=data.params;

    ['thermo-grid','kine-grid','sfc-grid'].forEach(id=>document.getElementById(id).innerHTML='');

    let total=0;
    PARAMS.forEach(p=>{
      const entry=params[p.key];
      if(!entry)return;
      const val=entry.value;
      const s=p.score(val);
      total+=s;
      const barPct=p.bar(val);
      const container=document.getElementById(p.grp+'-grid');
      renderParam(p.key, val, s, barPct, entry.src, container);
    });

    const pct=Math.round((total/PARAMS.length)*100);
    const arc=document.getElementById('ring-arc');
    arc.setAttribute('stroke-dashoffset',(175.9-175.9*pct/100).toFixed(1));
    arc.setAttribute('stroke',ringColor(pct));
    document.getElementById('score-num').textContent=pct+'%';
    const vEl=document.getElementById('score-verdict');
    if(pct>=65){vEl.textContent='Chase-worthy ✓';vEl.className='verdict verdict-g';}
    else if(pct>=40){vEl.textContent='Marginal setup';vEl.className='verdict verdict-a';}
    else{vEl.textContent='Not favorable';vEl.className='verdict verdict-r';}

    document.getElementById('loc-disp').textContent='📍 '+geo.name;
    document.getElementById('loc-disp').style.display='block';
    document.getElementById('score-wrap').style.display='block';
    document.getElementById('params-wrap').style.display='block';
    document.getElementById('status').style.display='none';
    document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('foot').style.display='flex';
  }catch(e){setStatus(e.message||'Error — check connection',true);}
}
fetchData();
</script>
</body>
</html>
